name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── .NET Build ──────────────────────────────────────────────────────────────
  build:
    name: Build (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Kolaytik.slnx

      - name: Build
        run: dotnet build Kolaytik.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Kolaytik.slnx -c Release --no-build --logger "console;verbosity=minimal"

  # ── Docker Build ────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: kolaytik-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max

      - name: Build Blazor image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.blazor
          push: false
          tags: kolaytik-blazor:${{ github.sha }}
          cache-from: type=gha,scope=blazor
          cache-to:   type=gha,scope=blazor,mode=max
