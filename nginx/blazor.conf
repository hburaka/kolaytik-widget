# Blazor WebAssembly — SPA routing
# Bu dosya blazor container'ının içindeki nginx tarafından kullanılır.

server {
    listen 80;

    root  /usr/share/nginx/html;
    index index.html;

    # Blazor ortam bildirimi (Production build)
    add_header Blazor-Environment "Production";

    # SPA fallback — tüm rotalar index.html'e düşer
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Blazor framework dosyaları — agresif cache
    location /_framework/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Blazor-Environment "Production";
    }

    # Statik varlıklar (css, js, wasm, png, ico)
    location ~* \.(css|js|wasm|png|ico|gif|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # appsettings — asla cache'leme (config güncellenebilir)
    location ~* appsettings.*\.json$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Blazor-Environment "Production";
    }

    # index.html — asla cache'leme
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
