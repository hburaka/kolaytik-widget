user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 16m;

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    application/wasm application/octet-stream image/svg+xml;
    gzip_min_length 1024;

    # ── Upstream'ler ──────────────────────────────────────────────────────
    upstream api_upstream {
        server api:8080;
    }

    upstream blazor_upstream {
        server blazor:80;
    }

    # ── HTTP → HTTPS yönlendirme ──────────────────────────────────────────
    # SSL kurulumu için aşağıdaki bloğu etkinleştirin.
    # Certbot: certbot --nginx -d api.kolaytik.com -d panel.kolaytik.com
    #
    # server {
    #     listen 80;
    #     server_name api.kolaytik.com panel.kolaytik.com widget.kolaytik.com;
    #     return 301 https://$host$request_uri;
    # }

    # ── API — api.kolaytik.com ────────────────────────────────────────────
    server {
        listen 80;
        # listen 443 ssl;
        server_name api.kolaytik.com;

        # ssl_certificate     /etc/letsencrypt/live/api.kolaytik.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/api.kolaytik.com/privkey.pem;
        # include             /etc/letsencrypt/options-ssl-nginx.conf;

        location / {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }

    # ── Blazor Panel — panel.kolaytik.com ────────────────────────────────
    server {
        listen 80;
        # listen 443 ssl;
        server_name panel.kolaytik.com;

        # ssl_certificate     /etc/letsencrypt/live/panel.kolaytik.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/panel.kolaytik.com/privkey.pem;
        # include             /etc/letsencrypt/options-ssl-nginx.conf;

        location / {
            proxy_pass         http://blazor_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── Widget Statik Dosyalar — widget.kolaytik.com ──────────────────────
    server {
        listen 80;
        # listen 443 ssl;
        server_name widget.kolaytik.com;

        # ssl_certificate     /etc/letsencrypt/live/widget.kolaytik.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/widget.kolaytik.com/privkey.pem;
        # include             /etc/letsencrypt/options-ssl-nginx.conf;

        root /var/www/widget;

        location / {
            # JotForm iframe'i farklı origin'den yükler
            add_header Access-Control-Allow-Origin "*";
            add_header Cache-Control "public, max-age=3600";
            try_files $uri =404;
        }
    }
}
